<svg width="320" height="450" viewBox="0 0 320 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Card container -->
  <rect x="10" y="10" width="300" height="430" rx="16" ry="16"
        fill="#ffffff" stroke="#35495E" stroke-width="2"/>

  <!-- Image area -->
  <rect x="30" y="30" width="260" height="140" rx="10" ry="10"
        fill="#F8F9FA"/>
  <text x="160" y="105" text-anchor="middle"
        fill="#A0A7AE" font-size="14">
    Imagen
  </text>

  <!-- Title -->
  <text x="30" y="200"
        fill="#35495E" font-size="18" font-weight="700">
    Título del Card
  </text>

  <!-- Subtitle -->
  <text x="30" y="225"
        fill="#6B7C8F" font-size="14">
    Descripción breve del contenido.
  </text>
  <text x="30" y="245"
        fill="#6B7C8F" font-size="14">
    Información adicional.
  </text>

  <!-- Social actions -->
  <text x="30" y="285"
        fill="#8A94A0" font-size="12" font-weight="600">
    Redes sociales
  </text>

  <!-- LinkedIn button -->
  <rect x="190" y="270" width="36" height="28" rx="6" ry="6"
        fill="#E9F5F0"/>
  <text x="208" y="289" text-anchor="middle"
        fill="#42B883" font-size="12" font-weight="700">
    in
  </text>

  <!-- GitHub button -->
  <rect x="236" y="270" width="36" height="28" rx="6" ry="6"
        fill="#E9F5F0"/>
  <text x="254" y="289" text-anchor="middle"
        fill="#42B883" font-size="12" font-weight="700">
    GH
  </text>

  <!-- CTA button -->
  <rect x="30" y="330" width="260" height="44" rx="10" ry="10"
        fill="#42B883"/>
  <text x="160" y="358" text-anchor="middle"
        fill="#ffffff" font-size="15" font-weight="700">
    CTA
  </text>
</svg>
